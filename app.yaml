command:
  - uvicorn
  - server:app
  - --host=0.0.0.0
  - --port=8000

env:
  - name: EDIFACT_PROFILE
    value: "ELM_STANDARD"
  - name: EDIFACT_SYNTAX
    value: "D96A"
  - name: EDIFACT_CHARSET
    value: "UNOC:3"
  - name: UNB_SENDER_GLN
    value: "4399901876613"
  - name: UNB_RECEIVER_GLN
    value: "3015981600108"
  - name: MASTERDATA_SOURCE_DIR
    value: "/Volumes/hcdap_prod/silver_hcfrdashlog/f2edi/masterdata/"
  - name: MASTERDATA_RUNTIME_DIR
    value: "/Volumes/hcdap_prod/silver_hcfrdashlog/f2edi/masterdata_runtime"
  - name: OUTBOX_DIR
    value: "/Volumes/hcdap_prod/silver_hcfrdashlog/f2edi/outbox"
  - name: LOG_DIR
    value: "/Volumes/hcdap_prod/silver_hcfrdashlog/f2edi/logs"
  - name: DB_PATH
    value: "/Volumes/hcdap_prod/silver_hcfrdashlog/f2edi/database/edifact_standalone.db"
  - name: INTAKE_DIR
    value: "/Volumes/hcdap_prod/silver_hcfrdashlog/f2edi/pdf"
  - name: PDF_STORAGE_DIR
    value: "/Volumes/hcdap_prod/silver_hcfrdashlog/f2edi/pdf"
  - name: DATABRICKS_MODEL_ENDPOINT
    value: "databricks-gpt-oss-120b"
  - name: EDIFACT_CATALOG
    value: "hcdap_prod"
  - name: EDIFACT_SCHEMA
    value: "silver_hcfrdashlog"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "607eec0346978542"
  - name: DEFAULT_APP_ACTOR
    value: "operator"
  - name: APP_ADMIN_USERS
    value: "dik1dy@bosch.com,dik1dy,khadara"
  - name: APP_REQUIRE_AUTH
    value: "true"
  # ── Persistence Tier 2 (Workspace JSONL) — no admin required ─────────────
  # Grant app SP CAN_EDIT on chosen Workspace folder (if Tier 2 is enabled)
  # - name: DATABRICKS_PERSIST_PATH
  #   value: "/Users/rsr1dy@bosch.com/EDIFACT/data/persist"
  #
  # ── Persistence Tier 1 (Delta / Unity Catalog) — requires admin grant ────
  # Run scripts/create_delta_tables.sql after granting schema access:
  #   GRANT CREATE, USAGE ON SCHEMA bci_rbs_prod.file2edi TO `<app-sp>`;
  # - name: DATABRICKS_WAREHOUSE_ID
  #   value: "607eec0346978542"
  # - name: EDIFACT_CATALOG
  #   value: "bci_rbs_prod"
  # - name: EDIFACT_SCHEMA
  #   value: "file2edi"
  # ─────────────────────────────────────────────────────────────────────────
  - name: F2EDI_API_BASE
    value: "https://file2edi-5555213114570927.7.azure.databricksapps.com"

resources:
  - name: serving-endpoint
    serving_endpoint:
      name: databricks-gpt-oss-120b
      permission: CAN_QUERY
