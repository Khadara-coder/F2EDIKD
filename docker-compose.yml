version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.py
    ports:
      - "${APP_PORT:-8088}:8088"
    volumes:
      - edifact_data:/data
      - ${MASTER_DATA_DIR:-./masterdata}:/masterdata:ro
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8088
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.py
    command: python run_worker.py
    volumes:
      - edifact_data:/data
      - ${MASTER_DATA_DIR:-./masterdata}:/masterdata:ro
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  edifact_data:
    driver: local
